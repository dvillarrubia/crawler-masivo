                              </div>
                            </template>
                          </template>
                          <!-- Security metrics -->
                          <template x-if="cat.key === 'security'">
                            <template x-for="m in [
                              {l:'Paginas analizadas', v:fmt.num(cat.metrics.total_checked)},
                              {l:'% HTTPS', v:fmt.pct(cat.metrics.pct_https)},
                              {l:'% HSTS', v:fmt.pct(cat.metrics.pct_hsts)},
                              {l:'% CSP', v:fmt.pct(cat.metrics.pct_csp)},
                              {l:'% contenido mixto', v:fmt.pct(cat.metrics.pct_mixed)},
                              {l:'Con contenido mixto', v:fmt.num(cat.metrics.mixed_count)},
                            ]">
                              <div class="metric-item">
                                <div class="metric-value" x-text="m.v"></div>
                                <div class="metric-label" x-text="m.l"></div>
                              </div>
                            </template>
                          </template>
                          <!-- Structured Data metrics -->
                          <template x-if="cat.key === 'structured_data'">
                            <template x-for="m in [
                              {l:'Paginas HTML', v:fmt.num(cat.metrics.total_html)},
                              {l:'Con datos estructurados', v:fmt.num(cat.metrics.pages_with_sd)},
                              {l:'% con SD', v:fmt.pct(cat.metrics.pct_with_sd)},
                              {l:'Bloques totales', v:fmt.num(cat.metrics.total_sd_blocks)},
                              {l:'Errores validacion', v:fmt.num(cat.metrics.sd_errors)},
                              {l:'% errores', v:fmt.pct(cat.metrics.pct_errors)},
                            ]">
                              <div class="metric-item">
                                <div class="metric-value" x-text="m.v"></div>
                                <div class="metric-label" x-text="m.l"></div>
                              </div>
                            </template>
                          </template>
                          <!-- i18n metrics -->
                          <template x-if="cat.key === 'i18n'">
                            <template x-for="m in [
                              {l:'Etiquetas hreflang', v:fmt.num(cat.metrics.total_hreflang)},
                              {l:'Idiomas', v:cat.metrics.languages?.join(', ') || '—'},
                              {l:'% retorno OK', v:fmt.pct(cat.metrics.pct_return_ok)},
                              {l:'% idioma valido', v:fmt.pct(cat.metrics.pct_lang_valid)},
                            ]">
                              <div class="metric-item">
                                <div class="metric-value" x-text="m.v"></div>
                                <div class="metric-label" x-text="m.l"></div>
                              </div>
                            </template>
                          </template>
                        </div>

                        <!-- Recomendaciones -->
                        <template x-if="cat.recommendations.length > 0">
                          <div class="recommendations-section">
                            <h4 class="text-dim text-sm mb-1" style="text-transform:uppercase;letter-spacing:.05em">Recomendaciones</h4>
                            <template x-for="rec in cat.recommendations" :key="rec.title">
                              <div class="recommendation">
                                <div class="recommendation-header">
                                  <span class="priority-badge" :class="priorityClass(rec.priority)" x-text="priorityLabel(rec.priority)"></span>
                                  <span class="recommendation-title" x-text="rec.title"></span>
                                  <template x-if="recHasUrls(rec)">
                                    <button class="btn-icon" @click.stop="toggleRecUrls(rec)"
                                      style="margin-left:.25rem;font-size:.72rem;padding:.15rem .4rem;border:1px solid var(--border);border-radius:3px;display:inline-flex;align-items:center;gap:.25rem;color:var(--accent);background:rgba(91,174,35,.06);cursor:pointer">
                                      <i data-lucide="list" style="width:11px;height:11px"></i>
                                      <span x-text="recUrlsOpen[rec.title] ? 'Ocultar URLs' : 'Ver URLs'"></span>
                                    </button>
                                  </template>
                                  <span class="recommendation-count" x-text="rec.affected_count + ' URLs'" x-show="rec.affected_count > 0"></span>
                                </div>
                                <p class="recommendation-desc" x-text="rec.description"></p>

                                <!-- URL list expandable -->
                                <template x-if="recUrlsOpen[rec.title]">
                                  <div style="margin-top:.5rem;padding:.5rem .65rem;background:var(--bg);border:1px solid var(--border);border-radius:8px;animation:fadeInUp .2s ease">
                                    <template x-if="recUrls[rec.title]?.loading">
                                      <div class="loading-overlay" style="padding:.35rem;justify-content:flex-start"><div class="spinner" style="width:14px;height:14px"></div> <span class="text-dim text-sm">Cargando URLs...</span></div>
                                    </template>
                                    <template x-if="recUrls[rec.title]?.loaded && recUrls[rec.title].urls.length === 0">
                                      <p class="text-dim text-sm">No se encontraron URLs afectadas.</p>
                                    </template>
                                    <template x-if="recUrls[rec.title]?.loaded && recUrls[rec.title].urls.length > 0">
                                      <div>
                                        <div style="display:flex;flex-direction:column;gap:.15rem;max-height:240px;overflow-y:auto">
                                          <template x-for="u in recUrls[rec.title].urls" :key="u.id">
                                            <div @click="openUrlDetail(u.id)" style="display:flex;align-items:center;gap:.5rem;padding:.25rem .4rem;border-radius:4px;cursor:pointer;font-size:.8rem;transition:background .15s" class="rec-url-row">
                                              <span class="exp-status" :class="expStatusClass(u.status_code)" x-text="u.status_code" style="font-size:.7rem;padding:.05rem .3rem"></span>
                                              <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)" :title="u.url" x-text="u.url"></span>
                                            </div>
                                          </template>
                                        </div>
                                        <div style="margin-top:.4rem;display:flex;align-items:center;gap:.5rem;padding-top:.35rem;border-top:1px solid var(--border)">
                                          <span class="text-dim" style="font-size:.72rem" x-text="recUrls[rec.title].urls.length + ' de ' + rec.affected_count + ' URLs'"></span>
                                          <button class="btn btn-sm" @click.stop="openRecInExplorer(rec)" style="margin-left:auto;font-size:.7rem;padding:.2rem .5rem;display:flex;align-items:center;gap:.25rem">
                                            <i data-lucide="external-link" style="width:10px;height:10px"></i> Ver todas
                                          </button>
                                        </div>
                                      </div>
                                    </template>
                                  </div>
                                </template>
                              </div>
                            </template>
                          </div>
                        </template>
                        <template x-if="cat.recommendations.length === 0">
                          <p class="text-dim text-sm" style="padding:.5rem 0">Sin problemas detectados en esta categoria.</p>
                        </template>
                      </div>
                    </div>
                  </template>
                </div>
              </div>
            </template>
          </div>
        </template>

      </div>
    </template>


    <!-- ============================================================ -->
    <!--            VISTA: DETALLE COMPLETO DE UNA URL                -->
    <!-- ============================================================ -->
    <template x-if="view === 'url-detail'">
      <div>
        <!-- Cargando -->
        <template x-if="urlDetailLoading">
          <div class="loading-overlay"><div class="spinner"></div> Cargando datos de la URL...</div>
        </template>

        <template x-if="!urlDetailLoading && urlDetail">
          <div>
            <!-- Cabecera de URL -->
            <div class="url-header-card card mb-2">
              <div class="flex items-center justify-between" style="gap:.75rem;flex-wrap:wrap">
                <div style="flex:1;min-width:0">
                  <div class="flex items-center gap-1 mb-1">
                    <span class="badge" :class="{
                      'badge-completed': urlDetail.status_group === '2xx',
                      'badge-running': urlDetail.status_group === '3xx',
                      'badge-cancelled': urlDetail.status_group === '4xx',
                      'badge-failed': urlDetail.status_group === '5xx'
                    }" x-text="(urlDetail.status_code || '—') + ' ' + (urlDetail.status_text || '')"></span>
                    <span class="badge" :class="urlDetail.indexable ? 'badge-completed' : 'badge-cancelled'"
                      x-text="urlDetail.indexability_status || (urlDetail.indexable ? 'Indexable' : 'No indexable')"></span>
                    <template x-if="urlDetail.is_internal !== null">
                      <span class="badge badge-pending" x-text="urlDetail.is_internal ? 'Interna' : 'Externa'"></span>
                    </template>
                  </div>
                  <div class="url-full-display" x-text="urlDetail.url" :title="urlDetail.url"></div>
                </div>
                <button class="btn btn-sm" @click="backToDetail()" style="display:flex;align-items:center;gap:.3rem">
                  <i data-lucide="arrow-left" style="width:13px;height:13px"></i> Volver
                </button>
              </div>
            </div>

            <!-- Mini stats de la URL -->
            <div class="stats-grid" style="grid-template-columns:repeat(auto-fit,minmax(120px,1fr))">
              <div class="stat-card">
                <div class="stat-value" style="font-size:1.3rem" x-text="fmt.ms(urlDetail.response_time_ms)"></div>
                <div class="stat-label">Tiempo</div>
              </div>
              <div class="stat-card">
                <div class="stat-value" style="font-size:1.3rem" x-text="fmt.bytes(urlDetail.transfer_size || urlDetail.content_length)"></div>
                <div class="stat-label">Tamano</div>
              </div>
              <div class="stat-card">
                <div class="stat-value" style="font-size:1.3rem" x-text="fmt.num(urlDetail.word_count)"></div>
                <div class="stat-label">Palabras</div>
              </div>
              <div class="stat-card">
                <div class="stat-value" style="font-size:1.3rem" x-text="fmt.num(urlDetail.inlinks_count)"></div>
                <div class="stat-label">Inlinks</div>
              </div>
              <div class="stat-card">
                <div class="stat-value" style="font-size:1.3rem" x-text="fmt.num(urlDetail.outlinks_count)"></div>
                <div class="stat-label">Outlinks</div>
              </div>
              <div class="stat-card">
                <div class="stat-value" style="font-size:1.3rem;color:var(--accent)" x-text="urlDetail.pagerank != null ? urlDetail.pagerank.toFixed(2) : '—'"></div>
                <div class="stat-label" data-tip="Importancia de esta pagina segun enlaces internos que recibe. Mas enlaces desde paginas importantes = mayor PageRank. Escala 0-10.">PageRank</div>
              </div>
              <div class="stat-card">
                <div class="stat-value" style="font-size:1.3rem" :class="urlDetail.issues?.length > 0 ? 'orange' : 'green'"
                  x-text="urlDetail.issues?.length || 0"></div>
                <div class="stat-label">Problemas</div>
              </div>
            </div>

            <!-- Pestanas del detalle de URL -->
            <div class="tabs">
              <div class="tab" :class="urlDetailTab === 'general' && 'active'" @click="urlDetailTab = 'general'">General</div>
              <div class="tab" :class="urlDetailTab === 'seo' && 'active'" @click="urlDetailTab = 'seo'">SEO</div>
              <div class="tab" :class="urlDetailTab === 'content' && 'active'" @click="urlDetailTab = 'content'">
                Contenido <span class="count" x-text="urlDetail.page_content ? fmt.num(urlDetail.page_content.content_length) : '—'"></span>
              </div>
              <div class="tab" :class="urlDetailTab === 'headings' && 'active'" @click="urlDetailTab = 'headings'">
                Encabezados <span class="count" x-text="urlDetail.headings?.length || 0"></span>
              </div>
              <div class="tab" :class="urlDetailTab === 'links' && 'active'" @click="urlDetailTab = 'links'">
                Enlaces <span class="count" x-text="(urlDetail.inlinks?.length || 0) + (urlDetail.outlinks?.length || 0)"></span>
              </div>
              <div class="tab" :class="urlDetailTab === 'resources' && 'active'" @click="urlDetailTab = 'resources'">
                Recursos <span class="count" x-text="urlDetail.resources?.length || 0"></span>
              </div>
              <div class="tab" :class="urlDetailTab === 'issues' && 'active'" @click="urlDetailTab = 'issues'">
                Problemas <span class="count" x-text="urlDetail.issues?.length || 0"></span>
              </div>
              <div class="tab" :class="urlDetailTab === 'security' && 'active'" @click="urlDetailTab = 'security'">Seguridad</div>
              <div class="tab" :class="urlDetailTab === 'structured' && 'active'" @click="urlDetailTab = 'structured'">
                Datos estr. <span class="count" x-text="urlDetail.structured_data?.length || 0"></span>
              </div>
            </div>

            <!-- ===== TAB: GENERAL ===== -->
            <template x-if="urlDetailTab === 'general'">
              <div class="card">
                <div class="detail-grid">
                  <div class="detail-row"><span class="detail-label">URL</span><span class="detail-value" style="word-break:break-all" x-text="urlDetail.url"></span></div>
                  <div class="detail-row"><span class="detail-label">Host</span><span class="detail-value" x-text="urlDetail.host || '—'"></span></div>
                  <div class="detail-row"><span class="detail-label">Path</span><span class="detail-value" x-text="urlDetail.path || '—'"></span></div>
                  <div class="detail-row"><span class="detail-label">Scheme</span><span class="detail-value" x-text="urlDetail.scheme || '—'"></span></div>
                  <div class="detail-row"><span class="detail-label">Interna</span><span class="detail-value" x-text="urlDetail.is_internal ? 'Si' : 'No'"></span></div>
                  <div class="detail-row"><span class="detail-label">Profundidad</span><span class="detail-value" x-text="urlDetail.crawl_depth ?? '—'"></span></div>
                  <div class="detail-row"><span class="detail-label">Codigo estado</span><span class="detail-value" x-text="(urlDetail.status_code || '—') + ' ' + (urlDetail.status_text || '')"></span></div>
                  <div class="detail-row"><span class="detail-label">Grupo estado</span><span class="detail-value" x-text="urlDetail.status_group || '—'"></span></div>
                  <div class="detail-row"><span class="detail-label">Content-Type</span><span class="detail-value" x-text="urlDetail.content_type || '—'"></span></div>
                  <div class="detail-row"><span class="detail-label">Tamano contenido</span><span class="detail-value" x-text="fmt.bytes(urlDetail.content_length)"></span></div>
                  <div class="detail-row"><span class="detail-label">Tamano transferencia</span><span class="detail-value" x-text="fmt.bytes(urlDetail.transfer_size)"></span></div>
                  <div class="detail-row"><span class="detail-label">Tiempo respuesta</span><span class="detail-value" x-text="fmt.ms(urlDetail.response_time_ms)"></span></div>
                  <div class="detail-row"><span class="detail-label">Version HTTP</span><span class="detail-value" x-text="urlDetail.http_version || '—'"></span></div>
                  <div class="detail-row"><span class="detail-label">Es HTML</span><span class="detail-value" x-text="urlDetail.is_html ? 'Si' : 'No'"></span></div>
                  <div class="detail-row"><span class="detail-label">Tipo recurso</span><span class="detail-value" x-text="urlDetail.resource_type || '—'"></span></div>
                  <div class="detail-row"><span class="detail-label">Indexable</span><span class="detail-value" x-text="urlDetail.indexable ? 'Si' : 'No'"></span></div>
                  <div class="detail-row"><span class="detail-label">Estado indexabilidad</span><span class="detail-value" x-text="urlDetail.indexability_status || '—'"></span></div>
                  <div class="detail-row"><span class="detail-label">Longitud URL</span><span class="detail-value" x-text="urlDetail.url_length || '—'"></span></div>
                  <div class="detail-row"><span class="detail-label">Prof. carpetas</span><span class="detail-value" x-text="urlDetail.folder_depth ?? '—'"></span></div>
                  <div class="detail-row"><span class="detail-label">Palabras</span><span class="detail-value" x-text="fmt.num(urlDetail.word_count)"></span></div>
                  <div class="detail-row"><span class="detail-label">Ratio texto</span><span class="detail-value" x-text="urlDetail.text_ratio != null ? urlDetail.text_ratio.toFixed(1) + '%' : '—'"></span></div>
                  <div class="detail-row"><span class="detail-label">Redireccion a</span><span class="detail-value" style="word-break:break-all" x-text="urlDetail.redirect_url || '—'"></span></div>
                  <div class="detail-row"><span class="detail-label">Tipo redireccion</span><span class="detail-value" x-text="urlDetail.redirect_type || '—'"></span></div>
                  <div class="detail-row"><span class="detail-label">Last-Modified</span><span class="detail-value" x-text="urlDetail.last_modified || '—'"></span></div>
                  <div class="detail-row"><span class="detail-label">Inlinks</span><span class="detail-value" x-text="fmt.num(urlDetail.inlinks_count)"></span></div>
                  <div class="detail-row"><span class="detail-label">Inlinks unicos</span><span class="detail-value" x-text="fmt.num(urlDetail.unique_inlinks_count)"></span></div>
                  <div class="detail-row"><span class="detail-label">Outlinks</span><span class="detail-value" x-text="fmt.num(urlDetail.outlinks_count)"></span></div>
                  <div class="detail-row"><span class="detail-label">Outlinks externos</span><span class="detail-value" x-text="fmt.num(urlDetail.external_outlinks_count)"></span></div>
                  <div class="detail-row"><span class="detail-label">PageRank</span><span class="detail-value" x-text="urlDetail.pagerank != null ? urlDetail.pagerank.toFixed(2) : '—'"></span></div>
                  <div class="detail-row"><span class="detail-label">Primera vez</span><span class="detail-value" x-text="fmt.date(urlDetail.first_seen_at)"></span></div>
                  <div class="detail-row"><span class="detail-label">Ultimo rastreo</span><span class="detail-value" x-text="fmt.date(urlDetail.last_crawled_at)"></span></div>
                </div>
              </div>
            </template>

            <!-- ===== TAB: SEO ===== -->
            <template x-if="urlDetailTab === 'seo'">
              <div>
                <template x-if="!urlDetail.html_meta">
                  <div class="empty"><h3>Sin metadatos HTML</h3><p class="text-dim">Esta URL no es HTML o no se pudieron extraer los metadatos</p></div>
                </template>

                <template x-if="urlDetail.html_meta">
                  <div class="seo-sections">
                    <!-- Title -->
                    <div class="card mb-2">
                      <h3 class="seo-section-title">Title</h3>
                      <div class="seo-value-box" x-text="urlDetail.html_meta.title || '(vacio)'"></div>
                      <div class="seo-meta-row mt-1">
                        <span class="badge badge-pending" x-text="(urlDetail.html_meta.title_len || 0) + ' caracteres'"></span>
                        <span class="badge badge-pending" x-text="(urlDetail.html_meta.title_pixel_width || 0) + 'px SERP'"></span>
                        <template x-if="urlDetail.html_meta.title_len > 60">
                          <span class="badge badge-cancelled">Demasiado largo</span>
                        </template>
                        <template x-if="urlDetail.html_meta.title_len && urlDetail.html_meta.title_len < 30">
                          <span class="badge badge-cancelled">Demasiado corto</span>
                        </template>
                      </div>
                    </div>

                    <!-- Meta Description -->
                    <div class="card mb-2">
                      <h3 class="seo-section-title">Meta Description</h3>
                      <div class="seo-value-box" x-text="urlDetail.html_meta.meta_description || '(vacio)'"></div>
                      <div class="seo-meta-row mt-1">
                        <span class="badge badge-pending" x-text="(urlDetail.html_meta.meta_description_len || 0) + ' caracteres'"></span>
                        <span class="badge badge-pending" x-text="(urlDetail.html_meta.meta_description_pixel_width || 0) + 'px SERP'"></span>
                      </div>
                    </div>

                    <!-- Meta Keywords -->
                    <template x-if="urlDetail.html_meta.meta_keywords">
                      <div class="card mb-2">
                        <h3 class="seo-section-title">Meta Keywords</h3>
                        <div class="seo-value-box" x-text="urlDetail.html_meta.meta_keywords"></div>
                      </div>
                    </template>

                    <!-- Directivas -->
                    <div class="card mb-2">
                      <h3 class="seo-section-title">Directivas</h3>
                      <div class="detail-grid" style="grid-template-columns:1fr 1fr">
                        <div class="detail-row"><span class="detail-label">Meta Robots</span><span class="detail-value" x-text="urlDetail.html_meta.meta_robots || '—'"></span></div>
                        <div class="detail-row"><span class="detail-label">X-Robots-Tag</span><span class="detail-value" x-text="urlDetail.html_meta.x_robots_tag || '—'"></span></div>
                        <div class="detail-row"><span class="detail-label">Canonical</span><span class="detail-value" style="word-break:break-all" x-text="urlDetail.html_meta.canonical_href || '—'"></span></div>
                        <div class="detail-row"><span class="detail-label">Canonical (header)</span><span class="detail-value" x-text="urlDetail.html_meta.canonical_header || '—'"></span></div>
                        <div class="detail-row"><span class="detail-label">Meta Refresh</span><span class="detail-value" x-text="urlDetail.html_meta.meta_refresh || '—'"></span></div>
                        <div class="detail-row"><span class="detail-label">Meta fuera de head</span><span class="detail-value" x-text="urlDetail.html_meta.has_meta_outside_head ? 'Si' : 'No'"></span></div>
                        <div class="detail-row"><span class="detail-label">rel=next</span><span class="detail-value" x-text="urlDetail.html_meta.rel_next || '—'"></span></div>
                        <div class="detail-row"><span class="detail-label">rel=prev</span><span class="detail-value" x-text="urlDetail.html_meta.rel_prev || '—'"></span></div>
                      </div>
                    </div>

                    <!-- Open Graph -->
                    <div class="card mb-2">
                      <h3 class="seo-section-title">Open Graph</h3>
                      <div class="detail-grid" style="grid-template-columns:1fr 1fr">
                        <div class="detail-row"><span class="detail-label">og:title</span><span class="detail-value" x-text="urlDetail.html_meta.og_title || '—'"></span></div>
                        <div class="detail-row"><span class="detail-label">og:description</span><span class="detail-value" x-text="urlDetail.html_meta.og_description || '—'"></span></div>
                        <div class="detail-row"><span class="detail-label">og:image</span><span class="detail-value" style="word-break:break-all" x-text="urlDetail.html_meta.og_image || '—'"></span></div>
                        <div class="detail-row"><span class="detail-label">og:url</span><span class="detail-value" style="word-break:break-all" x-text="urlDetail.html_meta.og_url || '—'"></span></div>
                        <div class="detail-row"><span class="detail-label">og:type</span><span class="detail-value" x-text="urlDetail.html_meta.og_type || '—'"></span></div>
                      </div>
                    </div>

                    <!-- Twitter Cards -->
                    <div class="card mb-2">
                      <h3 class="seo-section-title">Twitter Cards</h3>
                      <div class="detail-grid" style="grid-template-columns:1fr 1fr">
                        <div class="detail-row"><span class="detail-label">twitter:card</span><span class="detail-value" x-text="urlDetail.html_meta.twitter_card || '—'"></span></div>
                        <div class="detail-row"><span class="detail-label">twitter:title</span><span class="detail-value" x-text="urlDetail.html_meta.twitter_title || '—'"></span></div>
                        <div class="detail-row"><span class="detail-label">twitter:description</span><span class="detail-value" x-text="urlDetail.html_meta.twitter_description || '—'"></span></div>
                      </div>
                    </div>
                  </div>
                </template>
              </div>
            </template>

            <!-- ===== TAB: CONTENIDO ===== -->
            <template x-if="urlDetailTab === 'content'">
              <div class="card">
                <template x-if="urlDetail.page_content">
                  <div>
                    <div class="flex items-center justify-between mb-2">
                      <h3 class="seo-section-title" style="margin:0">Contenido principal extraido</h3>
                      <div class="flex items-center gap-1">
                        <span class="badge badge-pending" x-text="fmt.num(urlDetail.page_content.content_length) + ' caracteres'"></span>
                        <button class="btn btn-sm" :class="contentViewMode === 'markdown' ? 'btn-primary' : ''"
                          @click="contentViewMode = contentViewMode === 'markdown' ? 'text' : 'markdown'"
                          x-text="contentViewMode === 'markdown' ? 'Ver texto plano' : 'Ver Markdown'"></button>
                      </div>
                    </div>
                    <!-- Markdown rendered view -->
                    <template x-if="contentViewMode === 'markdown' && urlDetail.page_content.content_markdown">
                      <div class="markdown-body" style="max-height:600px;overflow-y:auto"
                        x-html="renderMarkdown(urlDetail.page_content.content_markdown)"></div>
                    </template>
                    <!-- Plain text fallback -->
                    <template x-if="contentViewMode !== 'markdown' || !urlDetail.page_content.content_markdown">
                      <div class="content-preview" style="max-height:600px" x-text="urlDetail.page_content.content_text"></div>
                    </template>
                  </div>
                </template>
                <template x-if="!urlDetail.page_content">
                  <div class="empty">
                    <h3>Sin contenido</h3>
                    <p class="text-dim">No se pudo extraer el contenido principal de esta pagina</p>
                  </div>
                </template>
              </div>
            </template>

            <!-- ===== TAB: ENCABEZADOS ===== -->
            <template x-if="urlDetailTab === 'headings'">
              <div class="card">
                <template x-if="urlDetail.headings && urlDetail.headings.length > 0">
                  <div>
                    <div class="flex items-center justify-between mb-2">
                      <h3 class="seo-section-title" style="margin:0">Jerarquia de encabezados</h3>
                      <span class="text-dim text-sm" x-text="urlDetail.headings.length + ' encabezados'"></span>
                    </div>
                    <div class="heading-tree">
                      <template x-for="h in urlDetail.headings" :key="h.id">
                        <div class="heading-item" :style="'padding-left:' + headingIndent(h.tag) + 'rem'">
                          <span class="heading-tag" :style="'color:' + headingColor(h.tag)" x-text="h.tag.toUpperCase()"></span>
                          <span class="heading-text" x-text="h.text || '(vacio)'"></span>
                        </div>
                      </template>
                    </div>
                  </div>
                </template>
                <template x-if="!urlDetail.headings || urlDetail.headings.length === 0">
                  <div class="empty"><h3>Sin encabezados</h3></div>
                </template>
              </div>
            </template>

            <!-- ===== TAB: ENLACES ===== -->
            <template x-if="urlDetailTab === 'links'">
              <div>
                <!-- Outlinks -->
                <div class="card mb-2">
                  <div class="card-header">
                    <h2>Outlinks (enlaces salientes)</h2>
                    <span class="badge badge-pending" x-text="(urlDetail.outlinks?.length || 0) + ' enlaces'"></span>
                  </div>
                  <template x-if="urlDetail.outlinks && urlDetail.outlinks.length > 0">
                    <div class="table-wrap">
                      <table>
                        <thead>
                          <tr>
                            <th>URL Destino</th>
                            <th>Texto ancla</th>
                            <th>Posicion</th>
                            <th>Tipo</th>
                            <th>Follow</th>
                          </tr>
                        </thead>
                        <tbody>
                          <template x-for="l in urlDetail.outlinks" :key="l.id">
                            <tr>

                              <td x-text="fmt.position(l.link_position)"></td>
                              <td x-text="l.link_type || '—'"></td>
                              <td :class="l.follow === false ? 'severity-warning' : ''" x-text="l.follow ? 'Si' : l.follow === false ? 'No' : '—'"></td>

                      </table>
                    </div>
                  </template>
                  <template x-if="!urlDetail.outlinks || urlDetail.outlinks.length === 0">

                  <div class="card-header">

                  <template x-if="urlDetail.inlinks && urlDetail.inlinks.length > 0">
                    <div class="table-wrap">
                      <table>
                        <thead>
                          <tr>
                            <th>URL Origen</th>
                            <th>Texto ancla</th>
                            <th>Posicion</th>
                            <th>Tipo</th>
                            <th>Follow</th>
                          </tr>
                        </thead>
                        <tbody>
                          <template x-for="l in urlDetail.inlinks" :key="l.id">
                            <tr>
                              <td style="max-width:350px" :title="l.from_url || ''"><div class="truncate" x-text="l.from_url || '—'"></div></td>
                              <td style="max-width:200px" :title="l.anchor_text || ''"><div class="truncate" x-text="l.anchor_text || '—'"></div></td>
                              <td x-text="fmt.position(l.link_position)"></td>
                              <td x-text="l.link_type || '—'"></td>
                              <td :class="l.follow === false ? 'severity-warning' : ''" x-text="l.follow ? 'Si' : l.follow === false ? 'No' : '—'"></td>
                            </tr>
                          </template>
                        </tbody>
                      </table>
                    </div>
                  </template>
                  <template x-if="!urlDetail.inlinks || urlDetail.inlinks.length === 0">
                    <div class="text-dim text-sm" style="padding:.5rem 0">Sin inlinks</div>
                  </template>
                </div>
              </div>
            </template>

            <!-- ===== TAB: RECURSOS ===== -->
            <template x-if="urlDetailTab === 'resources'">
              <div class="card">
                <template x-if="urlDetail.resources && urlDetail.resources.length > 0">
                  <div>
                    <div class="flex items-center justify-between mb-2">
                      <h3 class="seo-section-title" style="margin:0">Recursos de la pagina</h3>
                      <span class="text-dim text-sm" x-text="urlDetail.resources.length + ' recursos'"></span>
                    </div>
                    <div class="table-wrap">
                      <table>
                        <thead>
                          <tr>
                            <th>Tipo</th>
                            <th>URL</th>
                            <th>Alt</th>
                            <th>Tamano</th>
                            <th>Dimensiones</th>
                            <th>Mixto</th>
                          </tr>
                        </thead>
                        <tbody>
                          <template x-for="r in urlDetail.resources" :key="r.id">
                            <tr>
                              <td><span class="badge badge-pending" x-text="r.resource_type"></span></td>
                              <td style="max-width:400px" :title="r.resource_url"><div class="truncate" x-text="r.resource_url"></div></td>
                              <td style="max-width:150px" :title="r.alt_text || ''"><div class="truncate" x-text="r.alt_text || '—'"></div></td>
                              <td x-text="fmt.bytes(r.size_bytes)"></td>
                              <td x-text="r.width && r.height ? r.width + 'x' + r.height : '—'"></td>
                              <td :class="r.is_mixed_content ? 'severity-error' : ''" x-text="r.is_mixed_content ? 'Si' : '—'"></td>
                            </tr>
                          </template>
                        </tbody>
                      </table>
                    </div>
                  </div>
                </template>
                <template x-if="!urlDetail.resources || urlDetail.resources.length === 0">
                  <div class="empty"><h3>Sin recursos</h3><p class="text-dim">No se encontraron imagenes, CSS, JS u otros recursos en esta pagina</p></div>
                </template>
              </div>
            </template>

            <!-- ===== TAB: PROBLEMAS ===== -->
            <template x-if="urlDetailTab === 'issues'">
              <div class="card">
                <template x-if="urlDetail.issues && urlDetail.issues.length > 0">
                  <div>
                    <div class="flex items-center justify-between mb-2">
                      <h3 class="seo-section-title" style="margin:0">Problemas detectados</h3>
                      <span class="text-dim text-sm" x-text="urlDetail.issues.length + ' problemas'"></span>
                    </div>
                    <div class="issues-list">
                      <template x-for="i in urlDetail.issues" :key="i.id">
                        <div class="issue-item" :class="'issue-' + i.severity">
                          <div class="issue-header">
                            <span :class="'severity-' + i.severity" style="font-weight:600;text-transform:uppercase;font-size:.75rem"
                              x-text="fmt.severity(i.severity)"></span>
                            <span style="font-weight:500" x-text="fmt.issue(i.issue_type)"></span>
                          </div>
                          <template x-if="i.details">
                            <div class="issue-details">
                              <template x-for="[k, v] in Object.entries(i.details)" :key="k">
                                <span class="issue-detail-item"><span class="text-dim" x-text="k + ':'"></span> <span x-text="v"></span></span>
                              </template>
                            </div>
                          </template>
                        </div>
                      </template>
                    </div>
                  </div>
                </template>
                <template x-if="!urlDetail.issues || urlDetail.issues.length === 0">
                  <div class="empty">
                    <div style="font-size:2rem;margin-bottom:.5rem">&#10003;</div>
                    <h3 style="color:var(--green)">Sin problemas</h3>
                    <p class="text-dim">No se detectaron problemas SEO en esta pagina</p>
                  </div>
                </template>
              </div>
            </template>

            <!-- ===== TAB: SEGURIDAD ===== -->
            <template x-if="urlDetailTab === 'security'">
              <div class="card">
                <template x-if="urlDetail.security">
                  <div>
                    <div class="flex items-center justify-between mb-2">
                      <h3 class="seo-section-title" style="margin:0">Cabeceras de seguridad</h3>
                      <template x-if="securityScore()">
                        <span class="badge" :class="securityScore().pct >= 70 ? 'badge-completed' : securityScore().pct >= 40 ? 'badge-cancelled' : 'badge-failed'"
                          x-text="securityScore().score + '/' + securityScore().total + ' (' + securityScore().pct + '%)'"></span>
                      </template>
                    </div>
                    <div class="security-checks">
                      <div class="security-item" :class="urlDetail.security.is_https ? 'check-pass' : 'check-fail'">
                        <span class="check-icon" x-text="urlDetail.security.is_https ? '&#10003;' : '&#10007;'"></span>
                        <span>HTTPS</span>
                      </div>
                      <div class="security-item" :class="!urlDetail.security.has_mixed_content ? 'check-pass' : 'check-fail'">
                        <span class="check-icon" x-text="!urlDetail.security.has_mixed_content ? '&#10003;' : '&#10007;'"></span>
                        <span>Sin contenido mixto</span>
                      </div>
                      <div class="security-item" :class="urlDetail.security.has_hsts ? 'check-pass' : 'check-fail'">
                        <span class="check-icon" x-text="urlDetail.security.has_hsts ? '&#10003;' : '&#10007;'"></span>
                        <span>Strict-Transport-Security (HSTS)</span>
                      </div>
                      <div class="security-item" :class="urlDetail.security.has_csp ? 'check-pass' : 'check-fail'">
                        <span class="check-icon" x-text="urlDetail.security.has_csp ? '&#10003;' : '&#10007;'"></span>
                        <span>Content-Security-Policy (CSP)</span>
                      </div>
                      <div class="security-item" :class="urlDetail.security.has_x_content_type_options ? 'check-pass' : 'check-fail'">
                        <span class="check-icon" x-text="urlDetail.security.has_x_content_type_options ? '&#10003;' : '&#10007;'"></span>
                        <span>X-Content-Type-Options</span>
                      </div>
                      <div class="security-item" :class="urlDetail.security.has_x_frame_options ? 'check-pass' : 'check-fail'">
                        <span class="check-icon" x-text="urlDetail.security.has_x_frame_options ? '&#10003;' : '&#10007;'"></span>
                        <span>X-Frame-Options</span>
                      </div>
                      <div class="security-item" :class="!urlDetail.security.has_unsafe_crossorigin ? 'check-pass' : 'check-fail'">
                        <span class="check-icon" x-text="!urlDetail.security.has_unsafe_crossorigin ? '&#10003;' : '&#10007;'"></span>
                        <span>Sin crossorigin inseguro</span>
                      </div>
                      <template x-if="urlDetail.security.referrer_policy">
                        <div class="security-item check-pass">
                          <span class="check-icon">&#10003;</span>
                          <span>Referrer-Policy: <strong x-text="urlDetail.security.referrer_policy"></strong></span>
                        </div>
                      </template>
                    </div>
                  </div>
                </template>
                <template x-if="!urlDetail.security">
                  <div class="empty"><h3>Sin datos de seguridad</h3></div>
                </template>
              </div>
            </template>

            <!-- ===== TAB: DATOS ESTRUCTURADOS ===== -->
            <template x-if="urlDetailTab === 'structured'">
              <div class="card">
                <template x-if="urlDetail.structured_data && urlDetail.structured_data.length > 0">
                  <div>
                    <div class="flex items-center justify-between mb-2">
                      <h3 class="seo-section-title" style="margin:0">Datos estructurados</h3>
                      <span class="text-dim text-sm" x-text="urlDetail.structured_data.length + ' bloques'"></span>
                    </div>
                    <div class="structured-list">
                      <template x-for="s in urlDetail.structured_data" :key="s.id">
                        <div class="structured-item card mb-1" style="padding:.75rem">
                          <div class="flex items-center gap-1 mb-1">
                            <span class="badge badge-pending" x-text="s.format"></span>
                            <span class="badge" :class="s.validation_status === 'ok' ? 'badge-completed' : s.validation_status === 'error' ? 'badge-failed' : 'badge-cancelled'"
                              x-text="s.validation_status || '—'"></span>
                            <template x-if="s.schema_type">
                              <span style="font-weight:500" x-text="s.schema_type"></span>
                            </template>
                          </div>
                          <template x-if="s.raw">
                            <div class="content-preview" style="max-height:200px;font-size:.75rem" x-text="JSON.stringify(s.raw, null, 2)"></div>
                          </template>
                        </div>
                      </template>
                    </div>
                  </div>
                </template>
                <template x-if="!urlDetail.structured_data || urlDetail.structured_data.length === 0">
                  <div class="empty"><h3>Sin datos estructurados</h3><p class="text-dim">No se encontraron JSON-LD, Microdata ni RDFa en esta pagina</p></div>
                </template>
              </div>
            </template>

          </div>
        </template>
      </div>
    </template>


    <!-- ============================================================ -->
    <!--                  VISTA: EXPLORER (Screaming Frog)            -->
    <!-- ============================================================ -->
    <template x-if="view === 'explorer' && job">
      <div class="explorer">

        <!-- Sidebar -->
        <div class="exp-sidebar">
          <div class="exp-sidebar-header">
            <i data-lucide="table-2" style="width:14px;height:14px;color:var(--accent)"></i>
            Explorador
          </div>
          <div class="exp-sidebar-group">
            <template x-for="tab in EXP_TABS" :key="tab.key">
              <div>
                <template x-if="tab.divider">
                  <div class="exp-divider"></div>
                </template>
                <template x-if="!tab.divider">
                  <div class="exp-tab" :class="expTab === tab.key && 'active'" @click="setExplorerTab(tab.key)">
                    <i :data-lucide="tab.icon" class="exp-tab-icon"></i>
                    <span x-text="tab.label"></span>
                    <span class="exp-tab-badge" x-text="expBadgeCounts[tab.key] != null ? fmt.num(expBadgeCounts[tab.key]) : ''"></span>
                  </div>
                </template>
              </div>
            </template>
          </div>
        </div>

        <!-- Main area -->
        <div class="exp-main">

          <!-- Toolbar -->
          <div class="exp-toolbar">
            <button class="exp-back" @click="backFromExplorer()">
              <i data-lucide="arrow-left" style="width:13px;height:13px"></i>
              <span x-text="job.name" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
            </button>
            <div class="exp-search-wrap">
              <i data-lucide="search"></i>
              <input type="text" class="exp-search" placeholder="Buscar URL o titulo..." x-model="expSearch" @input="explorerSearchInput()">
            </div>
            <span class="exp-results-count" x-text="fmt.num(expTotal) + ' resultados'"></span>
            <button class="btn btn-sm" @click="exportCSV()" style="display:flex;align-items:center;gap:.25rem;margin-left:auto">
              <i data-lucide="download" style="width:12px;height:12px"></i> CSV
            </button>
          </div>

          <!-- Table -->
          <div class="exp-table-wrap">
            <template x-if="expLoading && expUrls.length === 0">
              <div class="loading-overlay"><div class="spinner"></div> Cargando...</div>
            </template>
            <template x-if="!expLoading && expUrls.length === 0">
              <div class="empty" style="padding:2rem">
                <p class="text-dim">No se encontraron URLs con estos filtros.</p>
              </div>
            </template>
            <template x-if="expUrls.length > 0">
              <table class="exp-table">
                <thead>
                  <tr>
                    <template x-for="col in getExpColumns()" :key="col">
                      <th :class="expSort === col && 'sorted'"
                          @click="EXP_COLUMN_DEFS[col]?.sortable && explorerSort(col)">
                        <span x-text="EXP_COLUMN_DEFS[col]?.label || col"></span>
                        <template x-if="expSort === col">
                          <span class="exp-sort-icon" x-text="expSortDir === 'asc' ? ' ▲' : ' ▼'"></span>
                        </template>
                      </th>
                    </template>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="row in expUrls" :key="row.id">
                    <tr :class="expSelectedUrl?.id === row.id && 'exp-row-selected'"
                        @click="selectExplorerUrl(row)"
                        @dblclick="openUrlFromExplorer(row.id)">
                      <template x-for="col in getExpColumns()" :key="row.id + '_' + col">
                        <td>
                          <template x-if="col === 'status_code'">
                            <span class="exp-status" :class="expStatusClass(row.status_code)" x-text="row.status_code || ''"></span>
                          </template>
                          <template x-if="col === 'url'">
                            <span :title="row.url" x-text="getExpCellValue(row, col)"></span>
                          </template>
                          <template x-if="col !== 'status_code' && col !== 'url'">
                            <span x-text="getExpCellValue(row, col)"></span>
                          </template>
                        </td>
                      </template>
                    </tr>
                  </template>
                </tbody>
              </table>
            </template>
          </div>

          <!-- Detail panel -->
          <template x-if="expDetailOpen && expSelectedUrl">
            <div class="exp-detail">
              <div class="exp-detail-header">
                <span class="exp-status" :class="expStatusClass(expSelectedUrl.status_code)" x-text="expSelectedUrl.status_code"></span>
                <span class="exp-detail-url" :title="expSelectedUrl.url" x-text="expSelectedUrl.url"></span>

                <button class="exp-detail-close" @click="closeExplorerDetail()">&times;</button>
              </div>
              <div class="exp-detail-tabs">
                <div class="exp-detail-tab" :class="expDetailTab === 'general' && 'active'" @click="expDetailTab = 'general'">General</div>

                <div class="exp-detail-tab" :class="expDetailTab === 'content' && 'active'" @click="expDetailTab = 'content'">Contenido</div>
                <div class="exp-detail-tab" :class="expDetailTab === 'links' && 'active'" @click="expDetailTab = 'links'">Links</div>
                <div class="exp-detail-tab" :class="expDetailTab === 'issues' && 'active'" @click="expDetailTab = 'issues'">Issues</div>
              </div>
              <div class="exp-detail-body">
                <!-- Loading -->
                <template x-if="!expUrlDetail">
                  <div class="loading-overlay" style="padding:.5rem"><div class="spinner"></div></div>
                </template>
                <template x-if="expUrlDetail">
                  <div>
                    <!-- General tab -->
                    <template x-if="expDetailTab === 'general'">
                      <div class="exp-detail-grid">
                        <div class="exp-detail-row"><span class="exp-detail-label">URL</span><span class="exp-detail-value" x-text="expUrlDetail.url"></span></div>
                        <div class="exp-detail-row"><span class="exp-detail-label">Estado</span><span class="exp-detail-value" x-text="expUrlDetail.status_code + ' ' + (expUrlDetail.status_text || '')"></span></div>
                        <div class="exp-detail-row"><span class="exp-detail-label">Tipo</span><span class="exp-detail-value" x-text="expUrlDetail.content_type || ''"></span></div>
                        <div class="exp-detail-row"><span class="exp-detail-label">Tamano</span><span class="exp-detail-value" x-text="fmt.bytes(expUrlDetail.content_length)"></span></div>
                        <div class="exp-detail-row"><span class="exp-detail-label">Tiempo</span><span class="exp-detail-value" x-text="fmt.ms(expUrlDetail.response_time_ms)"></span></div>
                        <div class="exp-detail-row"><span class="exp-detail-label">Profundidad</span><span class="exp-detail-value" x-text="expUrlDetail.crawl_depth ?? ''"></span></div>
                        <div class="exp-detail-row"><span class="exp-detail-label">Interna</span><span class="exp-detail-value" x-text="expUrlDetail.is_internal ? 'Si' : 'No'"></span></div>
                        <div class="exp-detail-row"><span class="exp-detail-label">Indexable</span><span class="exp-detail-value" x-text="expUrlDetail.indexable ? 'Si' : 'No'"></span></div>
                        <template x-if="expUrlDetail.redirect_url">
                          <div class="exp-detail-row"><span class="exp-detail-label">Redirige a</span><span class="exp-detail-value" x-text="expUrlDetail.redirect_url"></span></div>
                        </template>
                      </div>
                    </template>
                    <!-- SEO tab -->
                    <template x-if="expDetailTab === 'seo'">
                      <div class="exp-detail-grid">
                        <div class="exp-detail-row"><span class="exp-detail-label">Title</span><span class="exp-detail-value" x-text="expUrlDetail.html_meta?.title || '(vacio)'"></span></div>
                        <div class="exp-detail-row"><span class="exp-detail-label">Title len</span><span class="exp-detail-value" x-text="expUrlDetail.html_meta?.title_len ?? ''"></span></div>
                        <div class="exp-detail-row"><span class="exp-detail-label">Description</span><span class="exp-detail-value" x-text="expUrlDetail.html_meta?.meta_description || '(vacio)'"></span></div>
                        <div class="exp-detail-row"><span class="exp-detail-label">Desc len</span><span class="exp-detail-value" x-text="expUrlDetail.html_meta?.meta_description_len ?? ''"></span></div>
                        <div class="exp-detail-row"><span class="exp-detail-label">Canonical</span><span class="exp-detail-value" x-text="expUrlDetail.html_meta?.canonical_href || ''"></span></div>
                        <div class="exp-detail-row"><span class="exp-detail-label">Robots</span><span class="exp-detail-value" x-text="expUrlDetail.html_meta?.meta_robots || ''"></span></div>
                        <template x-if="expUrlDetail.headings && expUrlDetail.headings.length > 0">
                          <div class="exp-detail-row" style="grid-column:1/-1">
                            <span class="exp-detail-label">H1</span>
                            <span class="exp-detail-value" x-text="expUrlDetail.headings.filter(h => h.tag === 'h1').map(h => h.text).join(' | ') || '(sin H1)'"></span>
                          </div>
                        </template>
                        <div class="exp-detail-row"><span class="exp-detail-label">Palabras</span><span class="exp-detail-value" x-text="fmt.num(expUrlDetail.word_count)"></span></div>
                        <div class="exp-detail-row"><span class="exp-detail-label">PageRank</span><span class="exp-detail-value" x-text="expUrlDetail.pagerank != null ? expUrlDetail.pagerank.toFixed(4) : ''"></span></div>
                      </div>
                    </template>
                    <!-- Content tab -->
                    <template x-if="expDetailTab === 'content'">
                      <div>
                        <template x-if="expUrlDetail.headings && expUrlDetail.headings.length > 0">
                          <div style="margin-bottom:.75rem">
                            <div style="font-weight:600;font-size:.78rem;color:var(--accent);margin-bottom:.35rem">Encabezados</div>
                            <div class="heading-tree">
                              <template x-for="h in expUrlDetail.headings" :key="h.id">
                                <div class="heading-item" :style="'padding-left:' + headingIndent(h.tag) + 'rem'">
                                  <span class="heading-tag" :style="'color:' + headingColor(h.tag)" x-text="h.tag"></span>
                                  <span class="heading-text" x-text="h.text || '(vacio)'"></span>
                                </div>
                              </template>
                            </div>
                          </div>
                        </template>
                        <template x-if="expUrlDetail.page_content?.content_text">
                          <div>
                            <div style="font-weight:600;font-size:.78rem;color:var(--accent);margin-bottom:.35rem">Texto extraido (primeros 500 car.)</div>
                            <div class="content-preview" x-text="expUrlDetail.page_content.content_text.substring(0, 500)"></div>
                          </div>
                        </template>
                      </div>
                    </template>
                    <!-- Links tab -->
                    <template x-if="expDetailTab === 'links'">
                      <div>

                          <div class="exp-detail-row"><span class="exp-detail-label">Ext. outlinks</span><span class="exp-detail-value" x-text="fmt.num(expUrlDetail.external_outlinks_count)"></span></div>

                        <template x-if="expUrlDetail.inlinks && expUrlDetail.inlinks.length > 0">
                          <div style="margin-bottom:.5rem">

                            <template x-for="l in expUrlDetail.inlinks.slice(0, 20)" :key="l.id">
                              <div class="exp-link-item" x-text="l.from_url || l.to_url"></div>
