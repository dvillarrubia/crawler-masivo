                          </div>
                        </template>
                        <template x-if="expUrlDetail.outlinks && expUrlDetail.outlinks.length > 0">
                          <div>
                            <div style="font-weight:600;font-size:.78rem;color:var(--accent);margin-bottom:.25rem">Outlinks (top <span x-text="expUrlDetail.outlinks.length"></span>)</div>
                            <template x-for="l in expUrlDetail.outlinks.slice(0, 20)" :key="l.id">
                              <div class="exp-link-item" x-text="l.to_url"></div>
                            </template>
                          </div>
                        </template>
                      </div>
                    </template>
                    <!-- Issues tab -->
                    <template x-if="expDetailTab === 'issues'">
                      <div>
                        <template x-if="!expUrlDetail.issues || expUrlDetail.issues.length === 0">
                          <div class="text-dim" style="padding:.5rem 0">Sin problemas detectados.</div>
                        </template>
                        <template x-if="expUrlDetail.issues && expUrlDetail.issues.length > 0">
                          <div class="issues-list">
                            <template x-for="iss in expUrlDetail.issues" :key="iss.id">
                              <div class="issue-item" :class="'issue-' + iss.severity">
                                <div class="issue-header">
                                  <span class="badge" :class="'severity-' + iss.severity" x-text="fmt.severity(iss.severity)" style="font-size:.68rem"></span>
                                  <span style="font-weight:600;font-size:.8rem" x-text="fmt.issue(iss.issue_type)"></span>
                                </div>
                              </div>
                            </template>
                          </div>
                        </template>
                      </div>
                    </template>
                  </div>
                </template>
              </div>
            </div>
          </template>

          <!-- Status bar -->
          <div class="exp-statusbar">
            <span x-text="'Pag. ' + expPage + ' de ' + expPages"></span>
            <div class="exp-pager">
              <button :disabled="expPage <= 1" @click="setExpPage(1)">&#171;</button>
              <button :disabled="expPage <= 1" @click="setExpPage(expPage - 1)">&#8249;</button>
              <button :disabled="expPage >= expPages" @click="setExpPage(expPage + 1)">&#8250;</button>
              <button :disabled="expPage >= expPages" @click="setExpPage(expPages)">&#187;</button>
            </div>
          </div>

        </div>
      </div>
    </template>

  </main>
</div>


<!-- ===== MODAL: CREAR NUEVO RASTREO ===== -->
<template x-if="showCreate">
  <div class="modal-backdrop" @click.self="showCreate = false" @keydown.escape.window="showCreate = false">
    <div class="modal modal--wide">
      <div class="modal-header">
        <div>
          <h3 style="display:flex;align-items:center;gap:.4rem">
            <i data-lucide="radar" style="width:18px;height:18px;color:#5BAE23"></i> Nuevo rastreo
          </h3>
          <p class="text-dim text-sm" style="margin-top:.25rem">Configura y lanza un rastreo SEO completo de un sitio web</p>
        </div>
        <button class="btn-icon" @click="showCreate = false" style="font-size:1.25rem">&times;</button>
      </div>
      <div class="modal-body">
        <template x-if="createError">
          <div class="card mb-2" style="border-color:var(--red);color:var(--red);padding:.5rem .75rem;font-size:.85rem" x-text="createError"></div>
        </template>

        <!-- Campos siempre visibles -->
        <div class="form-group">
          <label>Nombre del trabajo *</label>
          <input type="text" x-model="createForm.name" placeholder="Ej: midominio.com - auditoria completa">
        </div>
        <div class="form-group">
          <label>URLs semilla * (una por linea)</label>
          <textarea x-model="createForm.seeds" placeholder="https://midominio.com" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label>ID de cliente</label>
          <input type="text" x-model="createForm.client_id" placeholder="Identificador opcional">
        </div>

        <!-- Barra de pestanas -->
        <div class="config-tabs">
          <div class="tab" :class="createForm.configTab === 'general' && 'active'" @click="createForm.configTab = 'general'" style="display:flex;align-items:center;gap:.3rem">
            <i data-lucide="settings" style="width:13px;height:13px"></i> General
          </div>
          <div class="tab" :class="createForm.configTab === 'spider' && 'active'" @click="createForm.configTab = 'spider'" style="display:flex;align-items:center;gap:.3rem">
            <i data-lucide="bug" style="width:13px;height:13px"></i> Spider
          </div>
          <div class="tab" :class="createForm.configTab === 'content' && 'active'" @click="createForm.configTab = 'content'" style="display:flex;align-items:center;gap:.3rem">
            <i data-lucide="file-text" style="width:13px;height:13px"></i> Contenido
          </div>
          <div class="tab" :class="createForm.configTab === 'speed' && 'active'" @click="createForm.configTab = 'speed'" style="display:flex;align-items:center;gap:.3rem">
            <i data-lucide="gauge" style="width:13px;height:13px"></i> Velocidad
          </div>
          <div class="tab" :class="createForm.configTab === 'http' && 'active'" @click="createForm.configTab = 'http'" style="display:flex;align-items:center;gap:.3rem">
            <i data-lucide="globe" style="width:13px;height:13px"></i> HTTP
          </div>
          <div class="tab" :class="createForm.configTab === 'analysis' && 'active'" @click="createForm.configTab = 'analysis'" style="display:flex;align-items:center;gap:.3rem">
            <i data-lucide="bar-chart-2" style="width:13px;height:13px"></i> Analisis
          </div>
        </div>

        <!-- ===== TAB: General ===== -->
        <div x-show="createForm.configTab === 'general'" style="margin-top:1rem">
          <div class="config-section" style="display:flex;align-items:center;gap:.35rem">
            <i data-lucide="sliders-horizontal" style="width:14px;height:14px;opacity:.6"></i> Limites de rastreo
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Profundidad maxima</label>
              <input type="number" x-model="createForm.max_depth" min="1" max="50">
            </div>
            <div class="form-group">
              <label>Maximo de URLs</label>
              <input type="number" x-model="createForm.max_urls" min="1" max="5000000">
            </div>
          </div>
          <div class="config-section" style="display:flex;align-items:center;gap:.35rem">
            <i data-lucide="zap" style="width:14px;height:14px;opacity:.6"></i> Concurrencia
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Peticiones concurrentes</label>
              <input type="number" x-model="createForm.concurrent_requests" min="1" max="256">
            </div>
            <div class="form-group">
              <label>Por dominio</label>
              <input type="number" x-model="createForm.concurrent_requests_per_domain" min="1" max="64">
            </div>
          </div>
          <div class="config-section" style="display:flex;align-items:center;gap:.35rem">
            <i data-lucide="shield" style="width:14px;height:14px;opacity:.6"></i> Identidad del crawler
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>User Agent</label>
              <select x-model="createForm.user_agent_preset">
                <option value="chrome_win">Chrome - Windows (recomendado)</option>
                <option value="chrome_mac">Chrome - macOS</option>
                <option value="safari_mac">Safari - macOS</option>
                <option value="firefox_win">Firefox - Windows</option>
                <option value="edge_win">Edge - Windows</option>
                <option value="googlebot">Googlebot</option>
                <option value="custom">Personalizado</option>
              </select>
            </div>
            <div class="form-group">
              <label>Huella TLS (anti-WAF)</label>
              <select x-model="createForm.impersonate">
                <option value="chrome124">Chrome (recomendado)</option>
                <option value="safari17_0">Safari</option>
                <option value="edge101">Edge</option>
              </select>
            </div>
          </div>
          <div class="form-group" x-show="createForm.user_agent_preset === 'custom'">
            <label>User Agent personalizado</label>
            <input type="text" x-model="createForm.user_agent_custom" placeholder="Mozilla/5.0 ...">
          </div>
          <div class="form-hint" style="margin-bottom:.75rem">El User Agent y la huella TLS se envian juntos. Para maxima eficacia, usa el mismo navegador en ambos (ej: Chrome + Chrome)</div>
          <div style="display:flex;gap:1.5rem;flex-wrap:wrap">
            <label class="checkbox-label"><input type="checkbox" x-model="createForm.follow_external"> Seguir externos</label>
            <label class="checkbox-label"><input type="checkbox" x-model="createForm.respect_robots"> Respetar robots.txt</label>
            <label class="checkbox-label"><input type="checkbox" x-model="createForm.render_js"> Renderizar JS</label>
          </div>
        </div>

        <!-- ===== TAB: Spider ===== -->
        <div x-show="createForm.configTab === 'spider'" style="margin-top:1rem">
          <div class="config-section" style="display:flex;align-items:center;gap:.35rem">
            <i data-lucide="layers" style="width:14px;height:14px;opacity:.6"></i> Tipos de recurso
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:.4rem .75rem;margin-bottom:1rem">
            <label class="checkbox-label"><input type="checkbox" x-model="createForm.crawl_images"> Imagenes</label>
            <label class="checkbox-label"><input type="checkbox" x-model="createForm.crawl_css"> CSS</label>
            <label class="checkbox-label"><input type="checkbox" x-model="createForm.crawl_js"> JavaScript</label>
            <label class="checkbox-label"><input type="checkbox" x-model="createForm.crawl_pdfs"> PDFs</label>
            <label class="checkbox-label"><input type="checkbox" x-model="createForm.crawl_fonts"> Fuentes</label>
            <label class="checkbox-label"><input type="checkbox" x-model="createForm.crawl_svg"> SVG</label>
            <label class="checkbox-label"><input type="checkbox" x-model="createForm.crawl_other"> Otros</label>
            <label class="checkbox-label"><input type="checkbox" x-model="createForm.check_external_resources"> Verificar recursos ext.</label>
          </div>

          <div class="config-section" style="display:flex;align-items:center;gap:.35rem">
            <i data-lucide="compass" style="width:14px;height:14px;opacity:.6"></i> Comportamiento
          </div>
          <div style="display:flex;gap:1.5rem;flex-wrap:wrap;margin-bottom:1rem">
            <label class="checkbox-label"><input type="checkbox" x-model="createForm.crawl_subdomains"> Rastrear subdominios</label>
            <label class="checkbox-label"><input type="checkbox" x-model="createForm.follow_nofollow"> Seguir nofollow</label>
          </div>

          <div class="config-section" style="display:flex;align-items:center;gap:.35rem">
            <i data-lucide="filter" style="width:14px;height:14px;opacity:.6"></i> Filtros de URL
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Longitud maxima URL (0 = sin limite)</label>
              <input type="number" x-model="createForm.max_url_length" min="0" max="10000">
            </div>
            <div class="form-group">
              <label>Profundidad de carpetas max (0 = sin limite)</label>
              <input type="number" x-model="createForm.max_folder_depth" min="0" max="100">
            </div>
          </div>

          <div class="config-section" style="display:flex;align-items:center;gap:.35rem">
            <i data-lucide="regex" style="width:14px;height:14px;opacity:.6"></i> Patrones
          </div>
          <div class="form-group">
            <label>Patrones de exclusion (uno por linea)</label>
            <textarea x-model="createForm.exclude_patterns" rows="2" placeholder="Ej: /admin/*&#10;*.pdf"></textarea>
          </div>
          <div class="form-group">
            <label>Patrones de inclusion (uno por linea)</label>
            <textarea x-model="createForm.include_patterns" rows="2" placeholder="Ej: /blog/*"></textarea>
          </div>
        </div>

        <!-- ===== TAB: Contenido ===== -->
        <div x-show="createForm.configTab === 'content'" style="margin-top:1rem">
          <div class="config-section" style="display:flex;align-items:center;gap:.35rem">
            <i data-lucide="database" style="width:14px;height:14px;opacity:.6"></i> Extraccion de datos
          </div>
          <div style="display:flex;flex-direction:column;gap:.5rem">
            <label class="checkbox-label"><input type="checkbox" x-model="createForm.extract_structured_data"> Datos estructurados (JSON-LD, Microdata)</label>
            <label class="checkbox-label"><input type="checkbox" x-model="createForm.extract_hreflang"> Etiquetas hreflang</label>
            <label class="checkbox-label"><input type="checkbox" x-model="createForm.extract_security_headers"> Cabeceras de seguridad</label>
            <label class="checkbox-label"><input type="checkbox" x-model="createForm.extract_page_content"> Contenido de pagina (texto + markdown)</label>
            <label class="checkbox-label"><input type="checkbox" x-model="createForm.store_raw_html"> Almacenar HTML crudo</label>
          </div>
        </div>

        <!-- ===== TAB: Velocidad ===== -->
        <div x-show="createForm.configTab === 'speed'" style="margin-top:1rem">
          <div class="config-section" style="display:flex;align-items:center;gap:.35rem">
            <i data-lucide="timer" style="width:14px;height:14px;opacity:.6"></i> Tiempos y reintentos
          </div>
          <div class="form-row-3">
            <div class="form-group">
              <label>Timeout descarga (s)</label>
              <input type="number" x-model="createForm.download_timeout" min="5" max="120">
            </div>
            <div class="form-group">
              <label>Reintentos</label>
              <input type="number" x-model="createForm.retry_count" min="0" max="10">
            </div>
            <div class="form-group">
              <label>Delay entre peticiones (s)</label>
              <input type="number" x-model="createForm.request_delay" min="0" max="30" step="0.5">
            </div>
          </div>

          <div class="config-section" style="display:flex;align-items:center;gap:.35rem">
            <i data-lucide="activity" style="width:14px;height:14px;opacity:.6"></i> AutoThrottle
          </div>
          <div style="display:flex;flex-direction:column;gap:.5rem">
            <label class="checkbox-label"><input type="checkbox" x-model="createForm.autothrottle_enabled"> Habilitar autothrottle</label>
          </div>
          <div class="form-group" style="margin-top:.75rem" x-show="createForm.autothrottle_enabled">
            <label>Concurrencia objetivo</label>
            <input type="number" x-model="createForm.autothrottle_target_concurrency" min="1" max="100" step="0.5">
            <div class="form-hint">Numero de peticiones simultaneas que el autothrottle intentara mantener</div>
          </div>
        </div>

        <!-- ===== TAB: HTTP ===== -->
        <div x-show="createForm.configTab === 'http'" style="margin-top:1rem">
          <div class="config-section" style="display:flex;align-items:center;gap:.35rem">
            <i data-lucide="file-code" style="width:14px;height:14px;opacity:.6"></i> Cabeceras personalizadas
          </div>
          <div class="form-group">
            <label>Headers (uno por linea, formato "Nombre: Valor")</label>
            <textarea x-model="createForm.custom_headers" rows="3" placeholder="X-Custom-Header: valor&#10;Cache-Control: no-cache"></textarea>
          </div>

          <div class="form-group">
            <label>Accept-Language</label>
            <input type="text" x-model="createForm.accept_language" placeholder="Ej: es-ES,es;q=0.9,en;q=0.8">
          </div>

          <div class="config-section" style="display:flex;align-items:center;gap:.35rem">
            <i data-lucide="cookie" style="width:14px;height:14px;opacity:.6"></i> Cookies
          </div>
          <div class="form-group">
            <label>Cookies (una por linea, formato "nombre=valor")</label>
            <textarea x-model="createForm.cookies" rows="3" placeholder="session_id=abc123&#10;lang=es"></textarea>
          </div>

          <div class="config-section" style="display:flex;align-items:center;gap:.35rem">
            <i data-lucide="lock" style="width:14px;height:14px;opacity:.6"></i> Autenticacion basica
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Usuario</label>
              <input type="text" x-model="createForm.basic_auth_user" placeholder="usuario">
            </div>
            <div class="form-group">
              <label>Contrasena</label>
              <input type="text" x-model="createForm.basic_auth_password" placeholder="contrasena">
            </div>
          </div>
        </div>

        <!-- ===== TAB: Analisis ===== -->
        <div x-show="createForm.configTab === 'analysis'" style="margin-top:1rem">
          <div class="config-section" style="display:flex;align-items:center;gap:.35rem">
            <i data-lucide="type" style="width:14px;height:14px;opacity:.6"></i> Titulo
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Longitud minima</label>
              <input type="number" x-model="createForm.title_min_length" min="0" max="200">
            </div>
            <div class="form-group">
              <label>Longitud maxima</label>
              <input type="number" x-model="createForm.title_max_length" min="1" max="500">
            </div>
          </div>

          <div class="config-section" style="display:flex;align-items:center;gap:.35rem">
            <i data-lucide="align-left" style="width:14px;height:14px;opacity:.6"></i> Meta descripcion
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Longitud minima</label>
              <input type="number" x-model="createForm.description_min_length" min="0" max="500">
            </div>
            <div class="form-group">
              <label>Longitud maxima</label>
              <input type="number" x-model="createForm.description_max_length" min="1" max="1000">
            </div>
          </div>

          <div class="config-section" style="display:flex;align-items:center;gap:.35rem">
            <i data-lucide="text-cursor-input" style="width:14px;height:14px;opacity:.6"></i> Contenido y enlaces
          </div>
          <div class="form-row-3">
            <div class="form-group">
              <label>Palabras minimas</label>
              <input type="number" x-model="createForm.min_word_count" min="0" max="10000">
            </div>
            <div class="form-group">
              <label>Max cadena redirecciones</label>
              <input type="number" x-model="createForm.max_redirect_chain_length" min="1" max="20">
            </div>
            <div class="form-group">
              <label>Max enlaces salientes</label>
              <input type="number" x-model="createForm.max_outlinks" min="1" max="10000">
            </div>
          </div>
        </div>

      </div>
      <div class="modal-footer">
        <button class="btn" @click="showCreate = false">Cancelar</button>
        <button class="btn btn-primary" @click="submitCreate()" :disabled="creating || !createForm.name || !createForm.seeds" style="display:flex;align-items:center;gap:.4rem">
          <template x-if="creating"><span class="spinner" style="width:14px;height:14px"></span></template>
          <i data-lucide="rocket" style="width:14px;height:14px" x-show="!creating"></i>
          Iniciar rastreo
        </button>
      </div>
    </div>
  </div>
</template>

<!-- ===== MODAL: IMPORTAR BACKUP ===== -->
<template x-if="showImportModal">
  <div class="modal-backdrop" @click.self="showImportModal = false" @keydown.escape.window="showImportModal = false">
    <div class="modal" style="max-width:480px">
      <div class="modal-header">
        <h3 style="display:flex;align-items:center;gap:.4rem">
          <i data-lucide="upload" style="width:18px;height:18px;color:var(--accent)"></i>
          Importar backup
        </h3>
        <button class="btn-icon" @click="showImportModal = false" style="font-size:1.25rem">&times;</button>
      </div>
      <div class="modal-body" style="padding:1.25rem">
        <p class="text-dim text-sm" style="margin-bottom:1rem">
          Selecciona un archivo ZIP generado con la funcion "Backup" para restaurar un rastreo completo con todos sus datos.
        </p>

        <label class="form-label">Archivo ZIP</label>
        <input type="file" accept=".zip" @change="importFile = $event.target.files[0]"
               class="form-input" style="padding:.4rem">

        <label class="form-label mt-2" style="display:flex;align-items:center;gap:.4rem;cursor:pointer">
          <input type="checkbox" x-model="importPreserveId">
          Conservar el ID original del job
        </label>
        <p class="text-dim text-sm" style="margin-top:.25rem">
          Si esta activo y ya existe un job con el mismo ID, la importacion fallara (409).
        </p>

        <template x-if="importError">
          <div class="text-sm mt-2" style="color:var(--red)" x-text="importError"></div>
        </template>

        <template x-if="importResult">
          <div class="card mt-2" style="background:var(--green-bg);border-color:var(--green);padding:.75rem">
            <p style="font-weight:600;color:var(--green);margin-bottom:.5rem">Importacion completada</p>
            <p class="text-sm">URLs importadas: <strong x-text="importResult.rows_imported.urls || 0"></strong></p>
            <template x-if="importResult.warnings && importResult.warnings.length > 0">
              <details class="mt-1">
                <summary class="text-sm text-dim" style="cursor:pointer" x-text="importResult.warnings.length + ' advertencias'"></summary>
                <ul class="text-sm" style="margin-top:.25rem;padding-left:1rem">
                  <template x-for="w in importResult.warnings.slice(0, 20)">
                    <li x-text="w" class="text-dim"></li>
                  </template>
                </ul>
              </details>
            </template>
          </div>
        </template>
      </div>
      <div class="modal-footer">
        <button class="btn" @click="closeImportModal()">Cerrar</button>
        <button class="btn btn-primary" @click="submitImport()" :disabled="importing || !importFile || importResult"
                style="display:flex;align-items:center;gap:.4rem">
          <template x-if="importing"><span class="spinner" style="width:14px;height:14px"></span></template>
          <i data-lucide="upload" style="width:14px;height:14px" x-show="!importing"></i>
          Importar
        </button>
      </div>
    </div>
  </div>
</template>

<!-- ===== MODAL: SUBIR CUENTA GSC ===== -->
<template x-if="showGscUploadModal">
  <div class="modal-backdrop" @click.self="showGscUploadModal = false" @keydown.escape.window="showGscUploadModal = false">
    <div class="modal" style="max-width:420px">
      <div class="modal-header">
        <h3 style="display:flex;align-items:center;gap:.4rem">
          <i data-lucide="key" style="width:18px;height:18px;color:var(--accent)"></i>
          Subir cuenta de servicio GSC
        </h3>
        <button class="btn-icon" @click="showGscUploadModal = false" style="font-size:1.25rem">&times;</button>
      </div>
      <div class="modal-body" style="padding:1.25rem">
        <div class="form-group" style="margin-bottom:1rem">
          <label>Nombre de la cuenta</label>
          <input type="text" x-model="gscUploadName" placeholder="Ej: Mi proyecto GSC" style="width:100%;padding:.5rem .75rem;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text)">
        </div>
        <div class="form-group">
          <label>Archivo JSON de cuenta de servicio</label>
          <input type="file" accept=".json" @change="gscUploadFile = $event.target.files[0]" style="font-size:.85rem">
          <div class="form-hint">El JSON de la cuenta de servicio de Google Cloud con permisos de lectura en Search Console.</div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" @click="showGscUploadModal = false">Cancelar</button>
        <button class="btn btn-primary" @click="uploadGscAccount()" :disabled="!gscUploadFile || !gscUploadName.trim()" style="display:flex;align-items:center;gap:.4rem">
          <i data-lucide="upload" style="width:14px;height:14px"></i> Guardar
        </button>
      </div>
    </div>
  </div>
</template>

</body>
</html>
