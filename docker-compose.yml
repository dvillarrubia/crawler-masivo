version: "3.8"

services:
  # ---------- Infrastructure ----------
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # Bind to localhost only — never expose Postgres to the public internet.
      # Local dev keeps host-to-container access; production routes
      # via the Docker network (Traefik to api, api to postgres).
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  # ---------- API ----------
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    environment:
      - PYTHONPATH=/app
    volumes:
      - hf_cache:/root/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ---------- Crawler Workers ----------
  crawler:
    build:
      context: .
      dockerfile: crawler/Dockerfile
    shm_size: '1gb'
    env_file: .env
    environment:
      - PYTHONPATH=/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 2g
          cpus: '2'

  # ---------- Analysis (runs inside crawler, but can also be standalone) ----------
  # Analysis is triggered by the crawler worker after each job completes.
  # Uncomment below to run as a separate service if needed:
  # analysis:
  #   build:
  #     context: .
  #     dockerfile: analysis/Dockerfile
  #   env_file: .env
  #   environment:
  #     - PYTHONPATH=/app
  #   depends_on:
  #     postgres:
  #       condition: service_healthy

volumes:
  pgdata:
  redisdata:
  hf_cache:
